    <style>
      @font-face {
        font-family: "온글잎의연체";
        src: url("./figma-assets/ownglyph-euiyeon.ttf") format("truetype");
        font-display: block;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #111;
      }
      body {
        display: grid;
        place-items: center;
      }
      .frame {
        position: relative;
        width: min(100vw, 177.7778vh);
        aspect-ratio: 16/9;
      }
      .frame img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .close {
        position: absolute;
        right: 0;
        top: 0;
        width: 4%;
        height: 7%;
        z-index: 2;
      }
      .close:focus-visible {
        outline: 2px solid #fff;
      }
    </style>
